<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反射神経</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; }
      #app { width: 100%; height: 100%; position: relative; }

      .overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10; pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%);
      }
      .overlay.hidden { display: none; }

      /* Title */
      #title-screen h1 {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 5rem; font-weight: 900; letter-spacing: 0.2em;
        color: #fff;
        text-shadow: 0 0 15px rgba(255,255,255,0.2), 0 4px 0 rgba(0,0,0,0.5);
        animation: title-glow 3s ease-in-out infinite;
      }
      @keyframes title-glow {
        0%, 100% { text-shadow: 0 0 15px rgba(255,255,255,0.2), 0 4px 0 rgba(0,0,0,0.5); }
        50% { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 4px 0 rgba(0,0,0,0.5); }
      }
      #title-screen .sub {
        font-family: 'Orbitron', sans-serif;
        font-size: 0.7rem; font-weight: 400; opacity: 0.3;
        letter-spacing: 0.5em; margin-top: 0.8rem; margin-bottom: 1.5rem;
        text-transform: uppercase;
      }
      .title-best {
        font-size: 0.85rem; font-weight: 700; opacity: 0.45;
        letter-spacing: 0.2em; margin-bottom: 1.5rem;
      }
      #title-screen .keys {
        font-size: 1rem; opacity: 0.6; letter-spacing: 0.05em;
        margin-bottom: 1rem;
      }
      #title-screen .keys kbd {
        display: inline-block; padding: 0.35em 0.9em; margin: 0 0.3em;
        border: 1px solid rgba(255,255,255,0.35); border-radius: 5px;
        font-family: 'Orbitron', monospace; font-size: 0.9em;
        background: rgba(255,255,255,0.08);
      }
      .title-buttons {
        display: flex; gap: 0.8rem; margin-top: 0.5rem; pointer-events: auto;
      }
      .title-buttons button {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.5em 1.2em; border-radius: 5px; cursor: pointer; opacity: 0.5;
      }
      .title-buttons button:hover { background: rgba(255,255,255,0.12); opacity: 0.7; }
      .start-btn {
        margin-top: 1.5rem; pointer-events: auto;
        background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.35);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
        font-weight: 900; letter-spacing: 0.2em;
        padding: 0.7em 3em; border-radius: 6px; cursor: pointer;
      }
      .start-btn:hover { background: rgba(255,255,255,0.2); }

      /* Game Over */
      #gameover-screen h2 {
        font-size: 2.5rem; font-weight: 900; letter-spacing: 0.15em;
        color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 3px 0 rgba(0,0,0,0.5);
        margin-bottom: 1.5rem;
      }
      #final-score { font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem; }
      #best-score { font-size: 1rem; font-weight: 400; opacity: 0.5; margin-bottom: 2rem; }
      #gameover-screen .hint { font-size: 0.75rem; opacity: 0.4; }
      #gameover-screen .hint kbd {
        display: inline-block; padding: 0.2em 0.5em;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
        font-family: 'Orbitron', monospace; font-size: 0.85em;
      }

      .new-best {
        font-size: 1.2rem; font-weight: 900; letter-spacing: 0.3em;
        color: #fff; text-shadow: 0 0 25px rgba(255,255,255,0.6);
        margin-bottom: 1rem;
        animation: new-best-pulse 0.8s ease-in-out infinite alternate;
      }
      .new-best.hidden { display: none; }
      @keyframes new-best-pulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }

      /* Score HUD */
      #score-display {
        position: absolute; top: 2rem; left: 50%; transform: translateX(-50%);
        font-size: 2.5rem; font-weight: 900; z-index: 10;
        letter-spacing: 0.1em; color: #fff;
        text-shadow: 0 0 15px rgba(255,255,255,0.3);
      }
      #score-display.hidden { display: none; }

      /* Speed Up */
      #speedup-display {
        position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
        font-size: 1.8rem; font-weight: 900; z-index: 15;
        letter-spacing: 0.2em; color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.5);
        opacity: 0; pointer-events: none;
      }
      #speedup-display.hidden { display: none; }
      @keyframes speedup-fade {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
      }

      /* Replay bar */
      #replay-bar {
        position: absolute; bottom: 0; left: 0; right: 0;
        z-index: 25; pointer-events: auto;
        display: flex; align-items: center; gap: 1rem;
        padding: 1rem 1.5rem;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(6px);
      }
      #replay-bar.hidden { display: none; }
      #replay-bar button {
        background: none; border: 1px solid rgba(255,255,255,0.25);
        color: #fff; font-size: 1.1rem; padding: 0.4em 0.8em;
        border-radius: 5px; cursor: pointer; font-family: 'Orbitron', sans-serif;
        min-width: 3rem; text-align: center;
      }
      #replay-bar button:hover { background: rgba(255,255,255,0.12); }
      #replay-progress {
        flex: 1; height: 10px; background: rgba(255,255,255,0.12);
        border-radius: 5px; cursor: pointer; position: relative;
      }
      #replay-progress-fill {
        height: 100%; background: #fff; border-radius: 5px;
        width: 0; transition: width 0.1s linear;
      }
      #replay-time {
        font-size: 0.85rem; opacity: 0.5; min-width: 6rem; text-align: right;
        letter-spacing: 0.05em;
      }

      /* Replay indicator */
      #replay-indicator {
        position: absolute; top: 2rem; right: 2rem;
        font-size: 0.9rem; font-weight: 700; z-index: 15;
        letter-spacing: 0.15em; opacity: 0.5;
        animation: replay-blink 1s ease-in-out infinite alternate;
      }
      #replay-indicator.hidden { display: none; }
      @keyframes replay-blink { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }

      /* History */
      #history-screen {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center;
        padding: 3rem 1rem;
        z-index: 20; pointer-events: auto;
        background: rgba(0,0,0,0.95);
        overflow-y: auto;
      }
      #history-screen.hidden { display: none; }
      #history-screen h2 {
        font-size: 1.8rem; font-weight: 900; letter-spacing: 0.2em;
        margin-bottom: 1.5rem;
      }
      #history-list {
        list-style: none; width: 100%; max-width: 500px;
      }
      .history-item {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.7rem 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 0.85rem;
      }
      .history-score {
        font-size: 1.1rem; font-weight: 900; min-width: 3.5rem;
        text-align: right; letter-spacing: 0.05em;
      }
      .history-best { text-shadow: 0 0 10px rgba(255,255,255,0.4); }
      .history-date { flex: 1; opacity: 0.3; font-size: 0.75rem; }
      .history-btns { display: flex; gap: 0.4rem; }
      .history-btn {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.35em 0.8em; border-radius: 4px; cursor: pointer;
        margin-left: 0.5rem;
      }
      .history-btn:hover { background: rgba(255,255,255,0.15); }
      .history-actions {
        display: flex; gap: 0.8rem; margin-top: 1.5rem;
      }
      #history-close, #history-import {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.5em 1.5em; border-radius: 4px; cursor: pointer;
      }
      #history-close:hover, #history-import:hover { background: rgba(255,255,255,0.12); }
      #replay-file-input { display: none; }

      /* Game over buttons */
      .gameover-buttons {
        display: flex; gap: 0.8rem; margin-top: 1.5rem; pointer-events: auto;
      }
      .share-btn {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.6em 1.5em; border-radius: 5px; cursor: pointer;
      }
      .share-btn:hover { background: rgba(255,255,255,0.15); }

      /* Credit */
      #credit {
        position: fixed; bottom: 1rem; right: 1.2rem; z-index: 30;
        font-size: 0.8rem; font-weight: 700; opacity: 0.4;
        color: #fff; text-decoration: none; letter-spacing: 0.08em;
        pointer-events: auto; transition: bottom 0.2s;
      }
      #credit:hover { opacity: 0.7; }
      #replay-bar:not(.hidden) ~ #credit,
      body:has(#replay-bar:not(.hidden)) #credit { bottom: 4rem; }

      /* Keybind screen */
      #keybind-screen {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 20; pointer-events: auto;
        background: rgba(0,0,0,0.95);
      }
      #keybind-screen.hidden { display: none; }
      #keybind-screen h2 {
        font-size: 1.5rem; font-weight: 900; letter-spacing: 0.2em;
        margin-bottom: 2rem;
      }
      .keybind-row {
        display: flex; align-items: center; gap: 1.2rem;
        margin-bottom: 1rem; font-size: 0.85rem;
      }
      .keybind-label { opacity: 0.5; min-width: 4rem; text-align: right; }
      .keybind-key {
        font-size: 1.2rem; font-weight: 900; min-width: 3rem; text-align: center;
      }
      .keybind-set {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.4em 1em; border-radius: 4px; cursor: pointer;
      }
      .keybind-set:hover { background: rgba(255,255,255,0.12); }
      .keybind-set.listening {
        border-color: #fff; background: rgba(255,255,255,0.15);
        animation: keybind-blink 0.6s ease-in-out infinite alternate;
      }
      @keyframes keybind-blink { 0% { opacity: 0.6; } 100% { opacity: 1; } }
      .keybind-actions { display: flex; gap: 0.8rem; margin-top: 2rem; }
      .keybind-actions button {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.5em 1.5em; border-radius: 4px; cursor: pointer;
      }
      .keybind-actions button:hover { background: rgba(255,255,255,0.12); }

      /* How to play */
      .how-to-play {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 1rem; font-weight: 400; opacity: 0.5;
        line-height: 1.8; margin-top: 2rem; text-align: center;
        letter-spacing: 0.05em;
      }

      /* Touch zones */
      .touch-zone {
        position: fixed; top: 0; bottom: 0; width: 50%; z-index: 4;
        pointer-events: none; transition: background 0.1s;
      }
      .touch-zone-left { left: 0; }
      .touch-zone-right { right: 0; }
      .touch-zone.active { background: rgba(255,255,255,0.04); }

      /* Touch-friendly gameover hint */
      @media (pointer: coarse) {
        #gameover-screen .hint { display: none; }
        .history-hint kbd { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="title-screen" class="overlay">
        <h1>反射神経</h1>
        <p id="title-best" class="title-best"></p>

        <p class="how-to-play">迫る壁をよけろ!<br/>左右キーでボールを動かし、壁をかわし続けよう</p>
        <p class="keys"><span id="title-keys">F  J</span></p>

        <div class="title-buttons">
          <button id="btn-history">HISTORY</button>
          <button id="btn-keybinds">KEYS</button>
        </div>

        <button id="btn-start" class="start-btn">START</button>
      </div>

      <div id="gameover-screen" class="overlay hidden">
        <h2>GAME OVER</h2>
        <p id="new-best" class="new-best hidden">NEW BEST!</p>
        <p id="final-score">0</p>
        <p id="best-score">BEST 0</p>
        <p class="hint"><kbd>Space</kbd> restart &nbsp; <kbd>⌫</kbd> title</p>
        <div class="gameover-buttons">
          <button id="share-btn" class="share-btn">SHARE ON 𝕏</button>
          <button id="back-to-title-btn" class="share-btn">TITLE</button>
        </div>
      </div>

      <div id="touch-zone-left" class="touch-zone touch-zone-left"></div>
      <div id="touch-zone-right" class="touch-zone touch-zone-right"></div>

      <a id="credit" href="https://x.com/evex_dev" target="_blank" rel="noopener">𝕏 @evex_dev</a>

      <div id="score-display" class="hidden">0</div>
      <div id="speedup-display" class="hidden">SPEED UP</div>
      <div id="replay-indicator" class="hidden">REPLAY</div>

      <div id="replay-bar" class="hidden">
        <button id="replay-back-btn">✕</button>
        <button id="replay-rw-btn">−5s</button>
        <button id="replay-play-btn">⏸</button>
        <button id="replay-ff-btn">+5s</button>
        <div id="replay-progress">
          <div id="replay-progress-fill"></div>
        </div>
        <button id="replay-speed-btn">1x</button>
        <span id="replay-time">0:00 / 0:00</span>
      </div>

      <div id="history-screen" class="hidden">
        <h2>HISTORY</h2>
        <ul id="history-list"></ul>
        <div class="history-actions">
          <button id="history-close">CLOSE</button>
          <button id="history-import">IMPORT</button>
        </div>
        <input type="file" id="replay-file-input" accept=".hsr" />
      </div>

      <div id="keybind-screen" class="hidden">
        <h2>KEYBINDS</h2>
        <div class="keybind-row">
          <span class="keybind-label">LEFT 1</span>
          <span id="keybind-left-1-key" class="keybind-key">F</span>
          <button id="keybind-left-1-btn" class="keybind-set">SET</button>
        </div>
        <div class="keybind-row">
          <span class="keybind-label">LEFT 2</span>
          <span id="keybind-left-2-key" class="keybind-key">←</span>
          <button id="keybind-left-2-btn" class="keybind-set">SET</button>
        </div>
        <div class="keybind-row">
          <span class="keybind-label">RIGHT 1</span>
          <span id="keybind-right-1-key" class="keybind-key">J</span>
          <button id="keybind-right-1-btn" class="keybind-set">SET</button>
        </div>
        <div class="keybind-row">
          <span class="keybind-label">RIGHT 2</span>
          <span id="keybind-right-2-key" class="keybind-key">→</span>
          <button id="keybind-right-2-btn" class="keybind-set">SET</button>
        </div>
        <div class="keybind-actions">
          <button id="keybind-reset">RESET</button>
          <button id="keybind-close">CLOSE</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
