<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反射神経</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; color: #fff; font-family: 'Segoe UI', sans-serif; }
      #app { width: 100%; height: 100%; position: relative; }

      .overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10; pointer-events: none;
      }
      .overlay.hidden { display: none; }

      #title-screen h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
      #title-screen .sub { font-size: 1.2rem; opacity: 0.7; margin-bottom: 2rem; }
      #title-screen .keys { font-size: 1rem; opacity: 0.5; }
      #title-screen .keys kbd {
        display: inline-block; padding: 0.2em 0.6em;
        border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
        font-family: monospace; margin: 0 0.15em;
      }

      #gameover-screen h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #ef5350; }
      #final-score { font-size: 1.5rem; margin-bottom: 0.3rem; }
      #best-score { font-size: 1.2rem; opacity: 0.7; margin-bottom: 1.5rem; }
      #gameover-screen .hint { font-size: 1rem; opacity: 0.5; }

      #score-display {
        position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);
        font-size: 2rem; font-weight: bold; z-index: 10;
        text-shadow: 0 0 10px rgba(79,195,247,0.6);
      }
      #score-display.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="title-screen" class="overlay">
        <h1>反射神経</h1>
        <p class="sub">4-Lane Dodge Game</p>
        <p class="keys">
          <kbd>J</kbd> dodge left &nbsp;
          <kbd>K</kbd> dodge right &nbsp;
          <kbd>Space</kbd> start
        </p>
      </div>

      <div id="gameover-screen" class="overlay hidden">
        <h2>GAME OVER</h2>
        <p id="final-score">Score: 0</p>
        <p id="best-score">Best: 0</p>
        <p class="hint">Press <kbd>Space</kbd> to retry</p>
      </div>

      <div id="score-display" class="hidden">0</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
