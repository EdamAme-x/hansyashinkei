<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反射神経</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; }
      #app { width: 100%; height: 100%; position: relative; }

      .overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10; pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%);
      }
      .overlay.hidden { display: none; }

      /* Title */
      #title-screen h1 {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 5rem; font-weight: 900; letter-spacing: 0.2em;
        color: #fff;
        text-shadow: 0 0 15px rgba(255,255,255,0.2), 0 4px 0 rgba(0,0,0,0.5);
        animation: title-glow 3s ease-in-out infinite;
      }
      @keyframes title-glow {
        0%, 100% { text-shadow: 0 0 15px rgba(255,255,255,0.2), 0 4px 0 rgba(0,0,0,0.5); }
        50% { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 4px 0 rgba(0,0,0,0.5); }
      }
      #title-screen .sub {
        font-family: 'Orbitron', sans-serif;
        font-size: 0.7rem; font-weight: 400; opacity: 0.3;
        letter-spacing: 0.5em; margin-top: 0.8rem; margin-bottom: 1.5rem;
        text-transform: uppercase;
      }
      .title-best {
        font-size: 0.85rem; font-weight: 700; opacity: 0.25;
        letter-spacing: 0.2em; margin-bottom: 1.5rem;
      }
      #title-screen .keys {
        font-size: 0.8rem; opacity: 0.55; letter-spacing: 0.05em;
        margin-bottom: 0.8rem;
      }
      #title-screen .keys kbd,
      #title-screen .history-hint kbd {
        display: inline-block; padding: 0.35em 0.9em; margin: 0 0.3em;
        border: 1px solid rgba(255,255,255,0.35); border-radius: 5px;
        font-family: 'Orbitron', monospace; font-size: 0.9em;
        background: rgba(255,255,255,0.08);
      }
      #title-screen .history-hint {
        font-size: 0.7rem; opacity: 0.3;
      }

      /* Game Over */
      #gameover-screen h2 {
        font-size: 2.5rem; font-weight: 900; letter-spacing: 0.15em;
        color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 3px 0 rgba(0,0,0,0.5);
        margin-bottom: 1.5rem;
      }
      #final-score { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
      #best-score { font-size: 1rem; font-weight: 400; opacity: 0.35; margin-bottom: 2rem; }
      #gameover-screen .hint { font-size: 0.75rem; opacity: 0.2; }
      #gameover-screen .hint kbd {
        display: inline-block; padding: 0.2em 0.5em;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
        font-family: 'Orbitron', monospace; font-size: 0.85em;
      }

      .new-best {
        font-size: 1.2rem; font-weight: 900; letter-spacing: 0.3em;
        color: #fff; text-shadow: 0 0 25px rgba(255,255,255,0.6);
        margin-bottom: 1rem;
        animation: new-best-pulse 0.8s ease-in-out infinite alternate;
      }
      .new-best.hidden { display: none; }
      @keyframes new-best-pulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }

      /* Score HUD */
      #score-display {
        position: absolute; top: 2rem; left: 50%; transform: translateX(-50%);
        font-size: 2.5rem; font-weight: 900; z-index: 10;
        letter-spacing: 0.1em; color: #fff;
        text-shadow: 0 0 15px rgba(255,255,255,0.3);
      }
      #score-display.hidden { display: none; }

      /* Speed Up */
      #speedup-display {
        position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
        font-size: 1.8rem; font-weight: 900; z-index: 15;
        letter-spacing: 0.2em; color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.5);
        opacity: 0; pointer-events: none;
      }
      #speedup-display.hidden { display: none; }
      @keyframes speedup-fade {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
      }

      /* Replay indicator */
      #replay-indicator {
        position: absolute; top: 2rem; right: 2rem;
        font-size: 0.9rem; font-weight: 700; z-index: 15;
        letter-spacing: 0.15em; opacity: 0.5;
        animation: replay-blink 1s ease-in-out infinite alternate;
      }
      #replay-indicator.hidden { display: none; }
      @keyframes replay-blink { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }

      /* History */
      #history-screen {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center;
        padding: 3rem 1rem;
        z-index: 20; pointer-events: auto;
        background: rgba(0,0,0,0.95);
        overflow-y: auto;
      }
      #history-screen.hidden { display: none; }
      #history-screen h2 {
        font-size: 1.8rem; font-weight: 900; letter-spacing: 0.2em;
        margin-bottom: 1.5rem;
      }
      #history-list {
        list-style: none; width: 100%; max-width: 500px;
      }
      .history-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 0.85rem;
      }
      .history-info { flex: 1; opacity: 0.6; letter-spacing: 0.05em; }
      .history-btn {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.35em 0.8em; border-radius: 4px; cursor: pointer;
        margin-left: 0.5rem;
      }
      .history-btn:hover { background: rgba(255,255,255,0.15); }
      .history-actions {
        display: flex; gap: 0.8rem; margin-top: 1.5rem;
      }
      #history-close, #history-import {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
        color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
        font-weight: 700; letter-spacing: 0.1em;
        padding: 0.5em 1.5em; border-radius: 4px; cursor: pointer;
      }
      #history-close:hover, #history-import:hover { background: rgba(255,255,255,0.12); }
      #replay-file-input { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="title-screen" class="overlay">
        <h1>反射神経</h1>
        <p class="sub">dodge or die</p>
        <p id="title-best" class="title-best"></p>
        <p class="keys">
          <kbd>F</kbd> &nbsp;
          <kbd>J</kbd> &nbsp;&nbsp;
          <kbd>Space</kbd>
        </p>
        <p class="history-hint"><kbd>H</kbd> history</p>
      </div>

      <div id="gameover-screen" class="overlay hidden">
        <h2>GAME OVER</h2>
        <p id="new-best" class="new-best hidden">NEW BEST!</p>
        <p id="final-score">0</p>
        <p id="best-score">BEST 0</p>
        <p class="hint"><kbd>Space</kbd> restart &nbsp; <kbd>⌫</kbd> title</p>
      </div>

      <div id="score-display" class="hidden">0</div>
      <div id="speedup-display" class="hidden">SPEED UP</div>
      <div id="replay-indicator" class="hidden">REPLAY</div>

      <div id="history-screen" class="hidden">
        <h2>HISTORY</h2>
        <ul id="history-list"></ul>
        <div class="history-actions">
          <button id="history-close">CLOSE</button>
          <button id="history-import">IMPORT</button>
        </div>
        <input type="file" id="replay-file-input" accept=".hsr" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
